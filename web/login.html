<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Smart Student AI Login</title>
    <link
      rel="stylesheet"
      href="https://www.gstatic.com/firebasejs/ui/6.0.2/firebase-ui-auth.css"
    />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, #e5eef9 100%);
        color: #0f172a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: #0f172a;
        color: #ffffff;
        width: min(420px, 100%);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.3);
      }

      h1 {
        margin: 0 0 8px 0;
        font-size: 24px;
      }

      p {
        margin: 0 0 18px 0;
        color: rgba(255, 255, 255, 0.75);
      }

      #loader {
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
      }

      .firebaseui-container {
        background: transparent;
        box-shadow: none;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Smart Student AI</h1>
      <p>Sign in with Google or email to continue.</p>
      <div id="firebaseui-auth-container"></div>
      <div id="loader">Loading sign-in options...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/ui/6.0.2/firebase-ui-auth.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDzSzUdnba1x2FnuOa-Qee9H5bY52cT3j4",
        authDomain: "smart-student-ai.firebaseapp.com",
        projectId: "smart-student-ai",
        storageBucket: "smart-student-ai.firebasestorage.app",
        messagingSenderId: "378407423860",
        appId: "1:378407423860:web:90f99336c2d5bc1996a621",
        measurementId: "G-EG78EM4ZZK",
      };

      firebase.initializeApp(firebaseConfig);

      const successUrl =
        window.location.origin + window.location.pathname + "#done";

      const uiConfig = {
        callbacks: {
          uiShown: function () {
            const loader = document.getElementById("loader");
            if (loader) {
              loader.style.display = "none";
            }
          },
        },
        signInSuccessUrl: successUrl,
        signInOptions: [
          firebase.auth.GoogleAuthProvider.PROVIDER_ID,
          firebase.auth.EmailAuthProvider.PROVIDER_ID,
        ],
        credentialHelper: firebaseui.auth.CredentialHelper.NONE,
      };

      const ui = new firebaseui.auth.AuthUI(firebase.auth());
      ui.start("#firebaseui-auth-container", uiConfig);
    </script>
  </body>
</html>
